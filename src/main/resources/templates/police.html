<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <div th:replace="cabecalho :: head"></div>

    <title>Crud Manager - Policiais</title>
</head>

<body>

<div th:replace="cabecalho :: nav"></div>

<div class="container my-2">

    <h1>Policiais</h1>
	<div th:if="${erro}" class="alert alert-danger">
	    <span th:text="${erro}"></span>
	</div>
    <div>
        <a class="btn btn-primary btn-sm mb-3 float-right"
           th:href="@{/police/form}">
            Adicionar Policial
        </a>
    </div>

    <table class="table table-striped table-responsive-md">

        <thead>
            <tr>
                <th>Nome</th>
                <th>Patente</th>
                <th>CPF</th>
                <th>E-mail</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody>

            <tr th:each="police : ${police}">

                <td th:text="${police.name}"></td>
                <td th:text="${police.rank}"></td>
                <td th:text="${police.cpf}"></td>
                <td th:text="${police.email}"></td>

                <td>

                    <a class="btn btn-primary"
                       th:href="@{/police/{id}(id=${police.id})}">
                        Alterar
                    </a>

                    <a class="btn btn-danger"
                       th:href="@{/police/delete/{id}(id=${police.id})}">
                        Excluir
                    </a>

                </td>

            </tr>

        </tbody>

    </table>

</div>

</body>
</html>
