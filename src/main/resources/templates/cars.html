<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <div th:replace="cabecalho :: head"></div>
    <title>Crud Manager - Cars</title>
</head>
<body>
<div th:replace="cabecalho :: nav"></div>
<div class="container my-2">

    <h1>Cars</h1>

    <div>
        <a class="btn btn-primary btn-sm mb-3 float-right"
           th:href="@{/cars/form}">
            Add Car
        </a>
    </div>

    <table class="table table-striped table-responsive-md">
        <thead>
            <tr>
                <th>License Plate</th>
                <th>CPF/CNPJ</th>
                <th>Chassis</th>
                <th>Year</th>
                <th>Actions</th>
            </tr>
        </thead>

        <tbody>
            <tr th:each="car : ${cars}">
                <td th:text="${car.licensePlate}"></td>
                <td th:text="${car.cpfOrCnpj}"></td>
                <td th:text="${car.chassis}"></td>
                <td th:text="${car.year}"></td>

                <td>
                    <a class="btn btn-primary"
                       th:href="@{/cars/{id}(id=${car.id})}">
                        Edit
                    </a>

                    <a class="btn btn-danger"
                       th:href="@{/cars/delete/{id}(id=${car.id})}">
                        Delete
                    </a>
                </td>

            </tr>
        </tbody>

    </table>

</div>

</body>
</html>
